<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Obrigado! - Diogo Gomes</title>
  <link href="assets/img/icon.png" rel="icon">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700|Raleway:400,600,700,800|Poppins:400,500,600" rel="stylesheet">
  <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Open Sans", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #040b14 0%, #0a1f3c 55%, #0e2a52 100%);
      color: #eaf3fb;
      padding: 24px;
    }
    .thanks {
      max-width: 540px;
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(92, 198, 245, 0.25);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
    .thanks .icon {
      width: 86px;
      height: 86px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: rgba(20, 157, 221, 0.18);
      color: #5cc6f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .thanks h1 { font-family: "Raleway", sans-serif; font-size: 30px; font-weight: 800; margin: 0 0 12px; color: #fff; }
    .thanks p { color: #b9d4e8; line-height: 1.7; margin: 0 0 28px; }
    .thanks a {
      display: inline-flex; align-items: center; gap: 8px;
      background: #149ddd; color: #fff; text-decoration: none;
      padding: 13px 28px; border-radius: 50px; font-weight: 600; transition: 0.3s;
    }
    .thanks a:hover { background: #37b3ed; transform: translateY(-2px); }
  </style>
</head>

<body>
  <div class="thanks">
    <div class="icon"><i class="bx bx-check"></i></div>
    <h1>Comentário enviado! 🎉</h1>
    <p>Obrigado pelo seu recado. Ele foi enviado para o autor e, após a moderação, poderá aparecer na página de projetos.</p>
    <a href="projects.html#comentarios"><i class="bx bx-arrow-back"></i> Voltar aos projetos</a>
  </div>
</body>

</html>
