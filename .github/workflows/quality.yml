name: Quality

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  html-and-links:
    name: HTML + links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar HTML (W3C)
        continue-on-error: true
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          blacklist: assets/vendor

      - name: Checar links quebrados
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            --exclude-path assets/vendor
            "./**/*.html"
          fail: false

  lighthouse:
    name: Lighthouse (perf/SEO/a11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse CI
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://diogomes.github.io/
            https://diogomes.github.io/projects.html
            https://diogomes.github.io/blog/index.html
          uploadArtifacts: true
          temporaryPublicStorage: true
